description: Cloudbeds API enforces per-property and per-app rate limits with HTTP 429 responses. Specific
  thresholds are not openly published.
notes: Use webhooks to reduce polling.
sources:
- https://developers.cloudbeds.com/reference
responseCodes:
  throttled: 429
limits:
- name: Default REST
  scope: property
  metric: requests
  limit: not publicly documented
  notes: Honor 429 and Retry-After.
policies:
- name: Backoff Strategy
  description: Clients should implement exponential backoff with jitter and honor any Retry-After header.
